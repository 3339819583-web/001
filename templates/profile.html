{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>个人中心</h2>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% else %}
        <div class="user-info">
            <h3>用户资料</h3>
            <ul class="info-list">
                <li><span class="label">ID：</span>{{ user.id }}</li>
                <li><span class="label">用户名：</span>{{ user.username }}</li>
                <li><span class="label">邮箱：</span>{{ user.email }}</li>
                <li><span class="label">手机：</span>{{ user.phone }}</li>
                <li><span class="label">角色：</span>{{ user.role }}</li>
                <li><span class="label">余额：</span><span class="balance">{{ user.balance }}</span></li>
            </ul>
        </div>

        <!-- 充值功能 -->
        <div class="search-section">
            <h3>充值</h3>
            <form method="POST" action="/recharge" class="search-form">
                <input type="hidden" name="user_id" value="{{ user.id }}">
                <input type="number" name="amount" class="search-input" placeholder="请输入金额" step="0.01" required>
                <button type="submit" class="btn btn-search">充值</button>
            </form>
        </div>

        <!-- 修改密码 -->
        <div class="search-section">
            <h3>修改密码</h3>
            <form method="POST" action="/change-password" class="search-form" style="flex-direction: column; gap: 10px;">
                <input type="hidden" name="username" value="{{ user.username }}">
                <input type="hidden" name="user_id" value="{{ user.id }}">
                <input type="password" name="new_password" class="search-input" placeholder="请输入新密码" required>
                <input type="password" name="confirm_password" class="search-input" placeholder="确认新密码" required>
                <button type="submit" class="btn btn-search">修改密码</button>
            </form>
        </div>
    {% endif %}

    <a href="/" class="btn btn-back">返回首页</a>
</div>
{% endblock %}
