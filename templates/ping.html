{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>🌐 Ping 网络诊断</h2>
    <form method="POST" action="/ping" class="search-form">
        <input type="text" name="ip" class="search-input" placeholder="输入 IP 地址或域名，如 8.8.8.8" value="{{ ip or '' }}" required>
        <button type="submit" class="btn btn-search">Ping</button>
    </form>

    {% if result or error %}
    <div class="ping-terminal">
        <div class="terminal-header">
            <span class="terminal-title">📟 终端输出</span>
        </div>
        <pre class="terminal-output">{% if error %}{{ error }}{% else %}{{ result }}{% endif %}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
