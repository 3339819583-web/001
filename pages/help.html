<!DOCTYPE html>
<html>
<head>
    <title>帮助中心</title>
</head>
<body>
    <h2>🆘 帮助中心</h2>

    <h3>1. 如何登录？</h3>
    <p>在登录页面输入您的用户名和密码即可登录。默认管理员账号为 admin，密码 admin123。</p>

    <h3>2. 如何注册？</h3>
    <p>点击导航栏的"注册"按钮，填写用户名、密码、邮箱和手机号即可完成注册。</p>

    <h3>3. 如何上传头像？</h3>
    <p>登录后在首页点击"上传头像"，选择图片文件后点击上传即可。支持 JPG、PNG、GIF 格式。</p>

    <h3>4. 如何查看和充值余额？</h3>
    <p>在个人中心页面可以查看您的余额，并输入金额进行充值。</p>

    <h3>5. 如何搜索用户？</h3>
    <p>在首页的搜索框中输入用户名或邮箱关键词，即可搜索已注册的用户。</p>

    <h3>6. 遇到问题怎么办？</h3>
    <p>请联系管理员获取帮助。</p>
</body>
</html>
